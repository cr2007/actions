name: Reusable Typst Deployment Workflow

on:
  workflow_call:
    inputs:
      source-file:
        description: Path to the Typst entry file to compile, relative to the repository root.
        required: true
        type: string
      output-file:
        description: Name of the compiled PDF, as it will appear on the deployed Pages site.
        required: false
        type: string
        default: document.pdf
      typst-version:
        description: Typst version range to install. Defaults to the latest release.
        required: false
        type: string
        default: latest
      extra-files-artifact:
        description: >-
          Name of a workflow artifact, uploaded by an earlier job in the
          calling workflow, to extract into the repository root before
          compiling. Use this to hand over files your Typst source reads at
          compile time but that shouldn't be committed, such as a
          metadata.yml built from secrets. Leave empty if not needed.
        required: false
        type: string
        default: ""
      extra-site-files-artifact:
        description: >-
          Name of a workflow artifact, uploaded by an earlier job in the
          calling workflow, to extract into the built site directory after
          compiling. Use this for static files that belong alongside the
          compiled PDF on the deployed site, such as a landing index.html.
          Leave empty if not needed.
        required: false
        type: string
        default: ""
      lfs:
        description: Whether to fetch Git LFS objects during checkout.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: ${{ inputs.lfs }}

      - uses: typst-community/setup-typst@v5
        with:
          typst-version: ${{ inputs.typst-version }}

      - name: Download extra files for compilation
        if: inputs.extra-files-artifact != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.extra-files-artifact }}
          path: .

      - name: Compile Typst document
        run: |
          mkdir -p _site
          typst compile "${{ inputs.source-file }}" "_site/${{ inputs.output-file }}"

      - name: Download extra site files
        if: inputs.extra-site-files-artifact != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.extra-site-files-artifact }}
          path: _site

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
