name: Deploy Typst document to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  call-reusable-workflow:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: cr2007/actions/.github/workflows/typst-deploy.yml@v1
    with:
      source-file: main.typ
      output-file: document.pdf
